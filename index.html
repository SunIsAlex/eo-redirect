<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>跳转中...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center;
            justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; color: #555; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <div class="box">
    <p>正在跳转，请稍候...</p>
    <p><a id="link" href="#">点击这里手动跳转</a></p>
    <p style="font-size:12px;color:#aaa">Token 更新于 2026-05-10 11:47 UTC</p>
  </div>
  <script>
    const eoDomain  = "https://cn-sunisalex-pages.zh-cn.edgeone.cool";
    const eoToken   = "ecd6d20f15b616dc1beae00c374b7b83";
    const eoTime    = "1778413636";

    // 透传用户访问的路径和查询参数
    const path      = window.location.pathname;
    const search    = window.location.search;
    const separator = search ? "&" : "?";
    const target    = eoDomain + path + search + separator
                      + "eo_token=" + eoToken + "&eo_time=" + eoTime;

    document.getElementById("link").href = target;
    window.location.replace(target);
  </script>
</body>
